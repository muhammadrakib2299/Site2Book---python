# Fly.io config for the API container.
# Deploy with:  fly launch --copy-config --no-deploy && fly deploy
# Frontend can deploy to Vercel separately (point NEXT_PUBLIC_API_BASE at this app's URL).

app = "site2book-api"
primary_region = "lhr"

[build]
  dockerfile = "docker/api.Dockerfile"

[env]
  SITE2BOOK_DATA_DIR = "/data"
  SITE2BOOK_MAX_PAGES = "50"
  SITE2BOOK_MAX_CONCURRENT_JOBS = "2"
  SITE2BOOK_RATE_LIMIT_PER_HOUR = "3"
  SITE2BOOK_FILE_TTL_HOURS = "24"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/api/health"

[[mounts]]
  source = "site2book_data"
  destination = "/data"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 2048

services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - site2book-data:/data
    environment:
      SITE2BOOK_DATA_DIR: /data
      SITE2BOOK_MAX_PAGES: "50"
      SITE2BOOK_MAX_CONCURRENT_JOBS: "2"
      SITE2BOOK_RATE_LIMIT_PER_HOUR: "3"
      SITE2BOOK_FILE_TTL_HOURS: "24"
      SITE2BOOK_ALLOWED_ORIGINS: "http://localhost:3000"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE: "http://api:8000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  site2book-data:
